<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sukhmani Cookies</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffe6f2,#e0c3fc);
scroll-behavior:smooth;
overflow-x:hidden;
}

header{
background:#7b2cbf;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
}

.logo{
font-size:28px;
font-weight:bold;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

.hero{
text-align:center;
padding:100px;
background:linear-gradient(135deg,#ff4d6d,#c77dff);
color:white;
}

.btn{
background:white;
color:#7b2cbf;
padding:10px 20px;
border-radius:20px;
text-decoration:none;
}

.products{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
}

.card{
background:white;
padding:20px;
width:200px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}
.card:hover{
transform:scale(1.1);
}
.bubbles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
overflow:hidden;
}

.bubbles span{
position:absolute;
bottom:-50px;
width:25px;
height:25px;
background:linear-gradient(135deg,#ff4d6d,#c77dff);
border-radius:50%;
animation:rise 10s infinite;
box-shadow:0 0 10px white;
}

.bubbles span:nth-child(1){left:10%; animation-duration:8s;}
.bubbles span:nth-child(2){left:20%; animation-duration:12s;}
.bubbles span:nth-child(3){left:30%; animation-duration:10s;}
.bubbles span:nth-child(4){left:40%; animation-duration:14s;}
.bubbles span:nth-child(5){left:50%; animation-duration:9s;}
.bubbles span:nth-child(6){left:60%; animation-duration:11s;}
.bubbles span:nth-child(7){left:70%; animation-duration:13s;}
.bubbles span:nth-child(8){left:80%; animation-duration:7s;}

@keyframes rise{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-800px);
opacity:0;
}
}
.shape1{
position:absolute;
width:200px;
height:200px;
background:#ff4d6d;
border-radius:50%;
top:100px;
left:-50px;
opacity:0.3;
animation:float 6s infinite ease-in-out;
}

.shape2{
position:absolute;
width:300px;
height:300px;
background:#c77dff;
border-radius:50%;
bottom:50px;
right:-100px;
opacity:0.3;
animation:float 8s infinite ease-in-out;
}
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0);}
}
.card img{
border-radius:10px;
}
.buy-btn{
background:#ff4d6d;
color:white;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
margin-top:10px;
}

.buy-btn:hover{
background:#c77dff;
}
.product-img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
}

.card{
width:90%;
margin:15px auto;
}

@media (max-width:600px){
.card{
width:90%;
}
}
.product-img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.card{
width:90%;
margin:15px auto;
}

body{
margin:0;
padding:0;
}
.product-img{
width:100%;
height:180px;
object-fit:cover;
border-radius:15px;
display:block;
}

.card{
width:90%;
margin:15px auto;
overflow:hidden;
border-radius:15px;
height:auto;
}

img{
max-width:100%;
height:auto;
pointer-events:none;
}

button{
padding:8px 15px;
border:none;
border-radius:20px;
background:#ff6b6b;
color:white;
font-size:14px;
cursor:pointer;
}

body{
margin:0;
padding:0;
}
html, body{
margin:0;
padding:0;
overflow-x:hidden;
}
</style>
</head>
